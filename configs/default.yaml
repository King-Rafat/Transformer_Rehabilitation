# Default configuration. Override any field on the command line, e.g.
#   python train.py --config configs/default.yaml --ex Kimore_ex5 --epoch 2000

# Exercise / dataset to use. Examples:
#   KIMORE : Kimore_ex1 ... Kimore_ex5
#   UI-PRMD: UI_ex1 ... UI_ex10  (folder names under ./UI-PRMD)
ex: Kimore_ex5

# Optimization
lr: 0.0001
epoch: 2000
batch_size: 1
weight_decay: 0.0
huber_delta: 0.1
seed: 145

# Data split
test_size: 0.2
split_seed: 420

# Paths
save_dir: ./checkpoints      # where train.py writes <ex>.pt
checkpoint: ./checkpoints/Kimore_ex5.pt   # which weights eval.py loads
